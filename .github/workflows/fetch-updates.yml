name: Fetch latest updates

on:
  schedule:
    # Asia/Shanghai 11:50 and 19:50.
    - cron: "50 3 * * *"
    - cron: "50 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest updates
        run: npm run fetch:updates

      - name: Commit updated data
        run: |
          if git diff --quiet data/latest-updates.json; then
            echo "No latest updates changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest-updates.json
          git commit -m "Update latest HITNotice updates"
          git push
